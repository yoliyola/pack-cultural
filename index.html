<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>En Construcción — Kutval | Camisetas de Arte Paper Cut Collage</title>
  <meta name="description" content="Kutval está preparando algo bonito. Camisetas únicas con arte paper cut collage. Volvemos pronto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .uc-page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    /* Two-column layout */
    .uc-layout {
      display: flex;
      align-items: center;
      gap: 60px;
      max-width: 1000px;
      width: 100%;
      position: relative;
      z-index: 5;
    }

    /* Left column: text */
    .uc-text {
      flex: 1;
      text-align: center;
    }

    /* Right column: products */
    .uc-products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      flex-shrink: 0;
    }

    .uc-product {
      background: var(--paper-white, #fefefa);
      padding: 8px 8px 4px;
      box-shadow: 3px 4px 14px rgba(0,0,0,0.12);
      transition: transform 0.4s, box-shadow 0.4s;
      position: relative;
      width: 150px;
    }

    .uc-product:nth-child(1) { transform: rotate(-3deg); }
    .uc-product:nth-child(2) { transform: rotate(2deg); }

    .uc-product:hover {
      transform: rotate(0deg) translateY(-6px) !important;
      box-shadow: 5px 8px 24px rgba(0,0,0,0.2);
    }

    .uc-product img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .uc-product-name {
      display: block;
      text-align: center;
      font-family: var(--font-accent, 'Caveat', cursive);
      font-size: 0.95rem;
      color: #555;
      padding: 6px 0 2px;
    }

    .uc-logo {
      display: block;
      width: min(240px, 50vw);
      height: auto;
      margin: 0 auto 18px;
      filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.15));
    }

    .uc-scissors {
      font-size: 2.5rem;
      display: inline-block;
      animation: snip 2s ease-in-out infinite;
      margin-bottom: 4px;
    }

    @keyframes snip {
      0%, 100% { transform: rotate(0deg) scale(1); }
      30% { transform: rotate(-12deg) scale(1.08); }
      60% { transform: rotate(8deg) scale(1); }
      80% { transform: rotate(-4deg) scale(1.04); }
    }

    .uc-cut-line {
      width: 180px;
      margin: 0 auto 16px;
      border: none;
      border-top: 3px dashed var(--kraft);
    }

    .uc-title {
      font-family: var(--font-headline);
      font-size: clamp(1.8rem, 5vw, 3.2rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 12px;
      color: var(--black);
    }

    .uc-title span {
      display: inline-block;
      background: var(--mustard);
      padding: 2px 14px;
      transform: rotate(-1.5deg);
      color: white;
    }

    .uc-subtitle {
      font-family: var(--font-hand);
      font-size: 1.1rem;
      color: #555;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .uc-badge {
      display: inline-block;
      font-family: var(--font-accent);
      font-size: 1.3rem;
      color: var(--red);
      padding: 8px 24px;
      border: 3px dashed var(--red);
      border-radius: 4px;
      background: rgba(192, 57, 43, 0.06);
      transform: rotate(-1.5deg);
      position: relative;
    }

    .uc-badge::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px dashed var(--red);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* Floating paper scraps */
    .uc-scrap {
      position: absolute;
      border-radius: 2px 4px 3px 5px;
      opacity: 0.1;
      z-index: 1;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .uc-scrap:nth-child(1) { width: 90px; height: 55px; background: var(--mustard); top: 6%; left: 4%; transform: rotate(18deg); animation-duration: 9s; }
    .uc-scrap:nth-child(2) { width: 55px; height: 80px; background: var(--red); top: 14%; right: 6%; transform: rotate(-22deg); animation-duration: 11s; animation-delay: 1s; }
    .uc-scrap:nth-child(3) { width: 110px; height: 35px; background: var(--green); bottom: 18%; left: 6%; transform: rotate(7deg); animation-duration: 8s; animation-delay: 0.5s; }
    .uc-scrap:nth-child(4) { width: 45px; height: 70px; background: var(--blue); bottom: 10%; right: 5%; transform: rotate(-14deg); animation-duration: 10s; animation-delay: 2s; }
    .uc-scrap:nth-child(5) { width: 70px; height: 45px; background: var(--kraft); top: 48%; left: 2%; transform: rotate(28deg); animation-duration: 13s; animation-delay: 0.8s; }

    @keyframes drift {
      0% { transform: translateY(0) rotate(var(--r, 10deg)); }
      100% { transform: translateY(-18px) rotate(calc(var(--r, 10deg) + 6deg)); }
    }

    /* Washi tape corners */
    .uc-tape-corner {
      position: absolute;
      width: 100px;
      height: 24px;
      opacity: 0.45;
      z-index: 6;
      pointer-events: none;
    }

    .uc-tape-corner::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.3) 3px, rgba(255,255,255,0.3) 6px);
    }

    .uc-tape-tl { top: 30px; left: 16px; background-color: rgba(230, 168, 23, 0.6); transform: rotate(-32deg); }
    .uc-tape-br { bottom: 30px; right: 14px; background-color: rgba(52, 152, 219, 0.5); transform: rotate(-20deg); }

    .uc-footer {
      text-align: center;
      padding: 12px 24px;
      font-family: var(--font-hand);
      font-size: 0.85rem;
      color: #5a4a3a;
      border-top: 2px dashed var(--kraft);
      background-color: var(--kraft);
    }

    /* Responsive: stack on mobile */
    @media (max-width: 768px) {
      .uc-layout {
        flex-direction: column;
        gap: 24px;
      }
      .uc-products {
        gap: 12px;
      }
      .uc-product {
        width: 120px;
      }
      .uc-tape-corner { display: none; }
      .uc-scissors { font-size: 2rem; }
      .uc-subtitle { font-size: 1rem; }
      html, body { overflow: auto; }
    }
  </style>
</head>
<body>

  <main class="uc-page paper-kraft">

    <!-- Floating paper scraps -->
    <div class="uc-scrap" aria-hidden="true"></div>
    <div class="uc-scrap" aria-hidden="true"></div>
    <div class="uc-scrap" aria-hidden="true"></div>
    <div class="uc-scrap" aria-hidden="true"></div>
    <div class="uc-scrap" aria-hidden="true"></div>

    <!-- Washi tape corners -->
    <div class="uc-tape-corner uc-tape-tl" aria-hidden="true"></div>
    <div class="uc-tape-corner uc-tape-br" aria-hidden="true"></div>

    <!-- Two-column layout -->
    <div class="uc-layout">

      <!-- Left: text -->
      <div class="uc-text">
        <img src="logo.png" alt="Kutval logo" class="uc-logo">
        <div class="uc-scissors" aria-hidden="true">&#9986;</div>
        <hr class="uc-cut-line" aria-hidden="true">
        <h1 class="uc-title">Estamos Cortando y<br>Pegando <span>Algo Bonito</span></h1>
        <p class="uc-subtitle">
          Nuestra web se está montando pieza a pieza, como un buen collage.<br>
          En nada volvemos.
        </p>
        <div class="uc-badge">Volvemos muy pronto</div>
      </div>

      <!-- Right: products -->
      <div class="uc-products">
        <div class="uc-product">
          <img src="sushi.jpg" alt="Sushi Drama — camiseta arte paper cut collage de sushi, Kutval" width="150" height="150">
          <span class="uc-product-name">Sushi Drama</span>
        </div>
        <div class="uc-product">
          <img src="img-producto-aguacate.jpg" alt="The Avo Breakup — camiseta arte paper cut collage de aguacates, Kutval" width="150" height="150">
          <span class="uc-product-name">The Avo Breakup</span>
        </div>
      </div>

    </div>
  </main>

  <footer class="uc-footer">
    &copy; 2026 Kutval &middot; Arte paper cut, no calidad de papel.
  </footer>

</body>
</html>
