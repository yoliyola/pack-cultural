<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kutval — Camisetas de Arte Paper Cut Collage</title>
  <meta name="description" content="Kutval está preparando algo bonito. Camisetas únicas con arte paper cut collage. Volvemos pronto.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@400;700&family=Caveat:wght@400;600;700&family=Patrick+Hand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 40px;
      position: relative;
      overflow: hidden;
    }

    /* === TWO COLUMN LAYOUT === */
    .layout {
      display: flex;
      align-items: center;
      gap: 70px;
      max-width: 1100px;
      width: 100%;
      position: relative;
      z-index: 5;
    }

    /* LEFT: message */
    .col-text {
      flex: 1;
      text-align: center;
    }

    .logo {
      display: block;
      width: min(220px, 45vw);
      height: auto;
      margin: 0 auto 16px;
      filter: drop-shadow(2px 3px 6px rgba(0,0,0,0.15));
    }

    .scissors {
      font-size: 2.2rem;
      display: inline-block;
      animation: snip 2s ease-in-out infinite;
      margin-bottom: 4px;
    }

    @keyframes snip {
      0%, 100% { transform: rotate(0deg) scale(1); }
      30% { transform: rotate(-12deg) scale(1.08); }
      60% { transform: rotate(8deg) scale(1); }
      80% { transform: rotate(-4deg) scale(1.04); }
    }

    .cut-line {
      width: 160px;
      margin: 0 auto 14px;
      border: none;
      border-top: 3px dashed var(--kraft);
    }

    .title {
      font-family: var(--font-headline);
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 10px;
      color: var(--black);
    }

    .title span {
      display: inline-block;
      background: var(--mustard);
      padding: 2px 12px;
      transform: rotate(-1.5deg);
      color: white;
    }

    .subtitle {
      font-family: var(--font-hand);
      font-size: 1.05rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-block;
      font-family: var(--font-accent);
      font-size: 1.2rem;
      color: var(--red);
      padding: 8px 22px;
      border: 3px dashed var(--red);
      border-radius: 4px;
      background: rgba(192, 57, 43, 0.06);
      transform: rotate(-1.5deg);
      position: relative;
    }

    .badge::before {
      content: '';
      position: absolute;
      inset: 3px;
      border: 1px dashed var(--red);
      border-radius: 2px;
      opacity: 0.4;
    }

    /* === DIVIDER === */
    .divider {
      width: 3px;
      height: 320px;
      border: none;
      border-left: 3px dashed var(--kraft);
      opacity: 0.5;
      flex-shrink: 0;
    }

    /* RIGHT: products */
    .col-products {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex-shrink: 0;
    }

    .col-products-title {
      font-family: var(--font-accent);
      font-size: 1.3rem;
      color: var(--black);
      text-align: center;
      margin-bottom: 4px;
    }

    .products-grid {
      display: flex;
      gap: 20px;
    }

    .product-card {
      background: var(--paper-white, #fefefa);
      padding: 10px;
      box-shadow: 4px 5px 18px rgba(0,0,0,0.13);
      transition: transform 0.4s, box-shadow 0.4s;
      position: relative;
      width: 200px;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .product-card:nth-child(1) { transform: rotate(-2.5deg); }
    .product-card:nth-child(2) { transform: rotate(2deg); }

    .product-card:hover {
      transform: rotate(0deg) translateY(-8px) !important;
      box-shadow: 6px 10px 28px rgba(0,0,0,0.22);
    }

    .product-card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
      border-radius: 2px;
    }

    .product-info {
      padding: 8px 4px 4px;
      text-align: center;
    }

    .product-name {
      font-family: var(--font-accent, 'Caveat', cursive);
      font-size: 1.15rem;
      color: var(--black);
      display: block;
      margin-bottom: 6px;
    }

    .product-cta {
      display: inline-block;
      font-family: var(--font-hand);
      font-size: 0.85rem;
      color: white;
      background: var(--red);
      padding: 5px 14px;
      border-radius: 3px;
      box-shadow: 2px 2px 0 var(--black);
      transition: all 0.3s;
    }

    .product-card:hover .product-cta {
      background: var(--mustard);
    }

    /* Washi tape on products */
    .product-tape {
      position: absolute;
      top: -8px;
      left: 50%;
      transform: translateX(-50%) rotate(-3deg);
      width: 70px;
      height: 20px;
      opacity: 0.85;
      z-index: 10;
    }

    .product-tape::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(45deg, transparent, transparent 3px, rgba(255,255,255,0.3) 3px, rgba(255,255,255,0.3) 6px);
    }

    .product-card:nth-child(1) .product-tape {
      background-color: rgba(230, 168, 23, 0.6);
      transform: translateX(-50%) rotate(-3deg);
    }

    .product-card:nth-child(2) .product-tape {
      background-color: rgba(39, 174, 96, 0.5);
      transform: translateX(-50%) rotate(2deg);
    }

    /* === DECORATIVE SCRAPS === */
    .scrap {
      position: absolute;
      border-radius: 2px 4px 3px 5px;
      opacity: 0.08;
      z-index: 1;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite alternate;
    }

    .scrap:nth-child(1) { width: 80px; height: 50px; background: var(--mustard); top: 8%; left: 3%; transform: rotate(18deg); animation-duration: 9s; }
    .scrap:nth-child(2) { width: 50px; height: 70px; background: var(--red); top: 12%; right: 5%; transform: rotate(-22deg); animation-duration: 11s; animation-delay: 1s; }
    .scrap:nth-child(3) { width: 90px; height: 30px; background: var(--green); bottom: 15%; left: 5%; transform: rotate(7deg); animation-duration: 8s; animation-delay: 0.5s; }
    .scrap:nth-child(4) { width: 40px; height: 60px; background: var(--blue); bottom: 8%; right: 4%; transform: rotate(-14deg); animation-duration: 10s; animation-delay: 2s; }

    @keyframes drift {
      0% { transform: translateY(0) rotate(var(--r, 10deg)); }
      100% { transform: translateY(-15px) rotate(calc(var(--r, 10deg) + 6deg)); }
    }

    /* === FOOTER === */
    .foot {
      text-align: center;
      padding: 10px 24px;
      font-family: var(--font-hand);
      font-size: 0.82rem;
      color: #5a4a3a;
      border-top: 2px dashed var(--kraft);
      background-color: var(--kraft);
    }

    /* === RESPONSIVE === */
    @media (max-width: 850px) {
      .layout {
        flex-direction: column;
        gap: 28px;
      }
      .divider {
        width: 200px;
        height: 0;
        border-left: none;
        border-top: 3px dashed var(--kraft);
      }
      .products-grid { gap: 14px; }
      .product-card { width: 155px; }
      .scissors { font-size: 1.8rem; }
      .subtitle { font-size: 0.95rem; }
      html, body { overflow: auto; }
      .page { padding: 20px 18px; }
    }

    @media (max-width: 400px) {
      .product-card { width: 130px; }
      .logo { width: min(180px, 50vw); }
    }
  </style>
</head>
<body>

  <main class="page paper-kraft">

    <!-- Decorative scraps -->
    <div class="scrap" aria-hidden="true"></div>
    <div class="scrap" aria-hidden="true"></div>
    <div class="scrap" aria-hidden="true"></div>
    <div class="scrap" aria-hidden="true"></div>

    <div class="layout">

      <!-- LEFT: Coming soon message -->
      <div class="col-text">
        <img src="logo.png" alt="Kutval logo" class="logo">
        <div class="scissors" aria-hidden="true">&#9986;</div>
        <hr class="cut-line" aria-hidden="true">
        <h1 class="title">Estamos Cortando y<br>Pegando <span>Algo Bonito</span></h1>
        <p class="subtitle">
          Nuestra web se está montando pieza a pieza, como un buen collage.<br>
          En nada volvemos.
        </p>
        <div class="badge">Volvemos muy pronto</div>
      </div>

      <!-- Divider -->
      <div class="divider" aria-hidden="true"></div>

      <!-- RIGHT: Products -->
      <div class="col-products">
        <p class="col-products-title">Nuestros primeros diseños</p>
        <div class="products-grid">

          <a href="https://www.etsy.com/es/shop/KawaiiCozyArt" target="_blank" rel="noopener" class="product-card">
            <div class="product-tape" aria-hidden="true"></div>
            <img src="sushi.jpg" alt="Sushi Drama — camiseta arte paper cut collage" width="200" height="200">
            <div class="product-info">
              <span class="product-name">Sushi Drama</span>
              <span class="product-cta">Ver en Etsy</span>
            </div>
          </a>

          <a href="https://www.etsy.com/es/shop/KawaiiCozyArt" target="_blank" rel="noopener" class="product-card">
            <div class="product-tape" aria-hidden="true"></div>
            <img src="img-producto-aguacate.jpg" alt="The Avo Breakup — cojín arte paper cut collage" width="200" height="200">
            <div class="product-info">
              <span class="product-name">The Avo Breakup</span>
              <span class="product-cta">Ver en Etsy</span>
            </div>
          </a>

        </div>
      </div>

    </div>
  </main>

  <footer class="foot">
    &copy; 2026 Kutval &middot; Arte paper cut, no calidad de papel.
  </footer>

</body>
</html>
